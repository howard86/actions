name: Quality checks
description: >-
  Run spell-check (typos), secret scan (gitleaks), and GitHub Actions linting
  (actionlint). Uses a repo-local typos/gitleaks config when present, otherwise
  the bundled default shipped with this action. Requires the repository to be
  checked out with fetch-depth 0 so gitleaks can scan history.

inputs:
  github-token:
    description: Token for gitleaks (pass secrets.GITHUB_TOKEN).
    required: true
  gitleaks-license:
    description: GITLEAKS_LICENSE for gitleaks-action org/enterprise use.
    required: false
    default: ""
  typos-config:
    description: Path to a typos config. Overrides auto-detection and the bundled default.
    required: false
    default: ""
  gitleaks-config:
    description: Path to a gitleaks config. Overrides auto-detection and the bundled default.
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Inputs/paths are bound to env vars and referenced as quoted shell
    # variables — never interpolated as ${{ }} into the script body, which
    # would be a command-injection vector.
    - name: Resolve typos config
      id: typos
      shell: bash
      env:
        OVERRIDE: ${{ inputs.typos-config }}
        BUNDLED: ${{ github.action_path }}/configs/typos.toml
      run: |
        if [ -n "$OVERRIDE" ]; then
          config="$OVERRIDE"
        elif [ -f _typos.toml ] || [ -f typos.toml ] || [ -f .typos.toml ]; then
          config=""   # empty: let typos natively auto-discover the repo-local config
        else
          config="$BUNDLED"
        fi
        echo "config=$config" >> "$GITHUB_OUTPUT"

    - name: Spell-check (typos)
      uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
      with:
        config: ${{ steps.typos.outputs.config }}

    # gitleaks-action loads config from the GITLEAKS_CONFIG env var, so a
    # concrete path is always resolved (repo-local or bundled fallback).
    - name: Resolve gitleaks config
      id: gitleaks
      shell: bash
      env:
        OVERRIDE: ${{ inputs.gitleaks-config }}
        BUNDLED: ${{ github.action_path }}/configs/gitleaks.toml
      run: |
        if [ -n "$OVERRIDE" ]; then
          config="$OVERRIDE"
        elif [ -f .gitleaks.toml ]; then
          config=".gitleaks.toml"
        elif [ -f gitleaks.toml ]; then
          config="gitleaks.toml"
        else
          config="$BUNDLED"
        fi
        echo "config=$config" >> "$GITHUB_OUTPUT"

    - name: Secret scan (gitleaks)
      uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITLEAKS_LICENSE: ${{ inputs.gitleaks-license }}
        GITLEAKS_CONFIG: ${{ steps.gitleaks.outputs.config }}

    # actionlint itself needs no GitHub API. reviewdog's default github-pr-check
    # reporter fetches the PR diff to filter findings to changed files, so a
    # transient api.github.com 503 reds this gate even when every workflow is
    # clean. local + nofilter keeps the identical pass/fail with zero API calls;
    # findings print to the job log with file:line:col instead of as inline PR
    # annotations. nofilter is required -- the local reporter demands a -diff
    # flag it cannot obtain under any diff-based filter mode.
    - name: Lint workflows (actionlint)
      uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1.73.0
      with:
        fail_level: error
        reporter: local
        filter_mode: nofilter
