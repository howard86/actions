name: Setup Bun + install
description: >-
  Set up Bun (and optionally Node), optionally restore the Turbo and Bun
  install caches, and install dependencies with a frozen lockfile. Assumes
  the repository is already checked out.

inputs:
  node-version:
    description: Node.js version to set up. Leave empty to skip Node setup.
    required: false
    default: ""
  working-directory:
    description: Directory holding package.json / bun.lock to install in.
    required: false
    default: "."
  cache-bun:
    description: >-
      Restore/save ~/.bun/install/cache via actions/cache. Useful on ephemeral
      runners; usually slower than a local disk hit on self-hosted (large
      download for little install speedup). Set "false" on sticky runners.
    required: false
    default: "true"
  cache-turbo:
    description: Restore/save the Turbo local cache under .turbo.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: ${{ inputs.working-directory }}/package.json

    - name: Setup Node.js
      if: inputs.node-version != ''
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ inputs.node-version }}

    # Stable key (lockfile + turbo config + ref) so primary hits share across
    # commits. Deliberately excludes package.json: Turbo hashes its own task
    # inputs (including manifests) and decides per-task hit/miss itself, so
    # restoring a stale .turbo is always safe — it just means more per-task
    # misses — while a version-only bump must not bust the whole cache.
    # github.sha always misses and re-saves every run.
    - name: Cache Turbo
      if: inputs.cache-turbo == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ inputs.working-directory }}/.turbo
        key: ${{ runner.os }}-turbo-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/turbo.json', inputs.working-directory)) }}-${{ github.ref_name }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/turbo.json', inputs.working-directory)) }}-
          ${{ runner.os }}-turbo-

    # setup-bun caches only the Bun binary, not the dependency store, so this
    # explicit cache of the install cache is required on ephemeral runners
    # (not redundant with setup-bun). Skip on self-hosted sticky disks.
    - name: Cache Bun install
      if: inputs.cache-bun == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install --frozen-lockfile
