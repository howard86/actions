name: Setup Bun + install
description: >-
  Set up Bun (and optionally Node), restore the Turbo and Bun install caches,
  and install dependencies with a frozen lockfile. Assumes the repository is
  already checked out.

inputs:
  node-version:
    description: Node.js version to set up. Leave empty to skip Node setup.
    required: false
    default: ""
  working-directory:
    description: Directory holding package.json / bun.lock to install in.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: ${{ inputs.working-directory }}/package.json

    - name: Setup Node.js
      if: inputs.node-version != ''
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache Turbo
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ${{ inputs.working-directory }}/.turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    # setup-bun caches only the Bun binary, not the dependency store, so this
    # explicit cache of the install cache is required (not redundant with it).
    - name: Cache Bun install
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install --frozen-lockfile
