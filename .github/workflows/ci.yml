# Reusable CI workflow for Bun + Turbo monorepos.
# These steps deliberately duplicate the `setup` and `quality` composites
# inline. A relative `./setup` reference would resolve against the *caller's*
# checkout (not this repo), and the full-ref form `howard86/actions/setup@<ref>`
# can't pin to this commit's own in-flight SHA — a moving/older ref would either
# defeat the SHA-pinning this repo exists to enforce or test stale composites.
# So the copy is intentional; test.yml runs both this workflow and the
# composites against the fixture to catch drift between them.
name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version. Empty skips Node setup.
        type: string
        required: false
        default: ""
      run-test:
        description: Run `bun run test`.
        type: boolean
        required: false
        default: true
      run-build:
        description: Run `bun run build`.
        type: boolean
        required: false
        default: true
      working-directory:
        description: Directory to install and run scripts in.
        type: string
        required: false
        default: "."
      cache-bun:
        description: >-
          Restore/save ~/.bun/install/cache via actions/cache. Set false on
          self-hosted sticky runners where the local Bun cache already persists.
        type: boolean
        required: false
        default: true
      cache-turbo:
        description: Restore/save the Turbo local cache under .turbo.
        type: boolean
        required: false
        default: true
    secrets:
      gitleaks-license:
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Applies to `run:` steps only (install + the bun scripts). The typos /
    # gitleaks / actionlint action steps ignore it and scan the repo root by
    # design — secret-scanning and workflow-linting should cover the whole repo,
    # not just one workspace subdirectory.
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ${{ inputs.working-directory }}/package.json

      - name: Setup Node.js
        if: inputs.node-version != ''
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache Turbo
        if: inputs.cache-turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ inputs.working-directory }}/.turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/turbo.json', inputs.working-directory)) }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/turbo.json', inputs.working-directory)) }}-
            ${{ runner.os }}-turbo-

      - name: Cache Bun install
        if: inputs.cache-bun
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run check

      - name: Spell-check (typos)
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.gitleaks-license }}

      # Kept in sync with the quality composite: reporter/filter_mode avoid the
      # GitHub API entirely, so a transient 503 can't red a clean gate.
      - name: Lint workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: local
          filter_mode: nofilter

      - name: Typecheck
        run: bun run typecheck

      # Unconditional: an unused-code gate that consumers can switch off is a
      # gate that stays off. Repos not ready for it stay pinned to v1.
      - name: Knip
        run: bun run knip

      - name: Test
        if: ${{ inputs.run-test }}
        run: bun run test

      - name: Build
        if: ${{ inputs.run-build }}
        run: bun run build
