# release-please
#
# Runs on every push to main — including Dependabot merges. This repo's job is
# to pin third-party action SHAs; a Dependabot bump is a shippable change, so
# release-please-config.json treats `chore` (Dependabot's default prefix) as a
# visible patch-level section rather than hiding it.
#
# Requires repo Setting → Actions → General →
#   "Allow GitHub Actions to create and approve pull requests" = enabled.
name: Release Please

on:
  push:
    branches: [main]
  # Manual re-run after config changes or if a Dependabot merge did not
  # refresh the Release PR for any reason.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
