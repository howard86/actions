# Self-test: exercise both the reusable ci.yml and the composites against a
# minimal Bun + Turbo fixture, so a broken action fails HERE rather than in a
# downstream consumer.
name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  reusable-ci:
    name: Reusable ci.yml against fixture
    uses: ./.github/workflows/ci.yml
    with:
      working-directory: fixtures/minimal
      node-version: "24"
      run-test: true
      run-build: true

  composites:
    name: Composites against fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: setup composite
        uses: ./setup
        with:
          node-version: "24"
          working-directory: fixtures/minimal

      - name: quality composite
        uses: ./quality
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
